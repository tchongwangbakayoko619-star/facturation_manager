{#
  Usage : {% include "components/button.html" with label=_("Enregistrer") type="submit" %}
  Variantes : primary (défaut), secondary, danger, ghost.
#}
{% load i18n %}
{% with button_type=type|default:"button" button_variant=variant|default:"primary" %}
    <button type="{{ button_type }}"
            {% if id %}id="{{ id }}"{% endif %}
            {% if name %}name="{{ name }}"{% endif %}
            {% if value %}value="{{ value }}"{% endif %}
            {% if disabled %}disabled{% endif %}
            class="inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50
                   {% if button_variant == 'danger' %}
                       bg-rose-600 text-white hover:bg-rose-700 focus:ring-rose-500
                   {% elif button_variant == 'secondary' %}
                       border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800
                   {% elif button_variant == 'ghost' %}
                       text-slate-600 hover:bg-slate-100 focus:ring-slate-400 dark:text-slate-300 dark:hover:bg-slate-800
                   {% else %}
                       bg-blue-600 text-white shadow-sm hover:bg-blue-700 focus:ring-blue-500
                   {% endif %}
                   {% if class %}{{ class }}{% endif %}">
        {% if icon %}
            <span aria-hidden="true">{{ icon }}</span>
        {% endif %}
        {{ label }}
    </button>
{% endwith %}
