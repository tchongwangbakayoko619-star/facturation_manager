{% load i18n %}
{% translate "Rechercher" as default_label %}
{% translate "Rechercher…" as default_placeholder %}
<label class="relative block {% if class %}{{ class }}{% endif %}">
  <span class="sr-only">{{ label|default:default_label }}</span>
  <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400" aria-hidden="true">⌕</span>
  <input type="search"
         name="{{ name|default:'q' }}"
         value="{{ value|default:'' }}"
         placeholder="{{ placeholder|default:default_placeholder }}"
         class="w-full rounded-xl border border-slate-300 bg-slate-50 py-2.5 pl-10 pr-4 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 dark:border-slate-700 dark:bg-slate-800 dark:text-white dark:focus:ring-blue-900/50">
</label>
