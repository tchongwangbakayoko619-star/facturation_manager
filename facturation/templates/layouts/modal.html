{% if modal_id %}
  <div id="{{ modal_id }}" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-950/50 p-4" role="dialog" aria-modal="true" aria-labelledby="{{ modal_id }}-title">
    <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-xl dark:bg-slate-900">
      <div class="flex items-start justify-between gap-4"><div><h2 id="{{ modal_id }}-title" class="text-lg font-bold text-slate-900 dark:text-white">{{ modal_title }}</h2>{% if modal_text %}<p class="mt-1 text-sm text-slate-500">{{ modal_text }}</p>{% endif %}</div><button type="button" data-modal-close="{{ modal_id }}" class="rounded-lg p-1 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Fermer">×</button></div>
      {% if modal_content %}<div class="mt-5">{{ modal_content }}</div>{% endif %}
    </div>
  </div>
{% endif %}
