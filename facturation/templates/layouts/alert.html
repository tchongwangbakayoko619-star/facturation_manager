{% if messages %}
  <div class="mb-6 space-y-3">
    {% for message in messages %}
      <div class="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm text-blue-800 dark:border-blue-900 dark:bg-blue-950/40 dark:text-blue-200">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
