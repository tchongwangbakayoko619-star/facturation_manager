{% extends "base.html" %}

{% block content %}
  <section class="mx-auto max-w-xl rounded-2xl border border-red-200 bg-white p-8 shadow-sm dark:border-red-950 dark:bg-slate-900">
    <p class="text-sm font-bold text-red-600">
      Action irréversible
    </p>
    
    <h2 class="mt-2 text-2xl font-bold">
      Supprimer {{ invoice.reference }} ?
    </h2>
    
    <p class="mt-3 text-slate-500">
      La facture sera supprimée et les quantités seront restaurées en stock.
    </p>

    <form method="post" class="mt-8 flex justify-end gap-3">
      {% csrf_token %}
      <a href="{% url 'invoices:list' %}" class="rounded-xl px-5 py-3 text-sm font-semibold">
        Annuler
      </a>
      <button class="rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white">
        Supprimer
      </button>
    </form>
  </section>
{% endblock %}
